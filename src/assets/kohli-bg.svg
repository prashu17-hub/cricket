<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#0c2340"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#1e3a8a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="jersey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="saffron" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9933" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff9933" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff9933" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#spotlight)"/>
  <rect y="620" width="1920" height="460" fill="#166534" opacity="0.85"/>
  <rect y="600" width="1920" height="30" fill="#fbbf24" opacity="0.5"/>
  <ellipse cx="960" cy="900" rx="780" ry="120" fill="#052e16" opacity="0.6"/>
  <rect y="0" width="1920" height="120" fill="url(#saffron)"/>
  <rect y="960" width="1920" height="120" fill="url(#saffron)"/>
  <!-- Stadium lights -->
  <g opacity="0.7" fill="#fef08a">
    <circle cx="200" cy="180" r="8"/><circle cx="1720" cy="180" r="8"/>
    <circle cx="420" cy="140" r="6"/><circle cx="1500" cy="140" r="6"/>
  </g>
  <!-- Batsman silhouette (Kohli-style pose) -->
  <g transform="translate(760 220) scale(1.05)">
    <ellipse cx="200" cy="520" rx="140" ry="28" fill="#000" opacity="0.35"/>
    <path fill="url(#jersey)" d="M175 120c28-8 62-6 85 18 22 24 18 58 8 88l-12 42 28 8 18 120 22 180h-48l-22-150-38 12-8 138h-46l12-200 32-48c-8-32-4-72 18-98z"/>
    <path fill="#0f172a" d="M248 88c22 18 32 48 28 78-6 42-38 72-72 78-36 6-72-12-88-42-16-30-8-68 18-92 26-24 72-32 114-22z"/>
    <path fill="#f59e0b" d="M155 200h90v18c-28 12-62 12-90 0z"/>
    <path fill="#78350f" d="M168 448 220 420l52 200-38 18-66-190z"/>
    <path fill="#1e293b" d="M120 360h52l-8 200h-44z"/>
  </g>
  <!-- Cricket ball -->
  <g transform="translate(1280 480)">
    <circle r="42" fill="#dc2626"/>
    <path d="M-42 0 Q0 -30 42 0 Q0 30 -42 0" fill="none" stroke="#fef2f2" stroke-width="3" opacity="0.8"/>
    <path d="M0 -42 Q25 0 0 42 Q-25 0 0 -42" fill="none" stroke="#fef2f2" stroke-width="3" opacity="0.5"/>
  </g>
  <!-- India tricolor accent stripes -->
  <rect y="0" width="1920" height="14" fill="#ff9933" opacity="0.9"/>
  <rect y="14" width="1920" height="14" fill="#fff" opacity="0.85"/>
  <rect y="28" width="1920" height="14" fill="#138808" opacity="0.9"/>
</svg>
